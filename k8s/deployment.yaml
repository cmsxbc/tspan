apiVersion: apps/v1
kind: Deployment
metadata:
  name: tspan-server
  namespace: tspan-system
  labels:
    app: tspan-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tspan-server
  template:
    metadata:
      labels:
        app: tspan-server
    spec:
      containers:
        - name: tspan-server
          image: tspan-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              value: "/app/data/data.db"
            - name: BIND_ADDR
              value: "0.0.0.0:8080"
            - name: RUST_LOG
              value: "tspan_server=info,tower_http=info"
            - name: WEB_PASSWORD
              value: "changeme"
              # TODO: replace with a Kubernetes Secret reference in production
              # valueFrom:
              #   secretKeyRef:
              #     name: tspan-web-auth
              #     key: password
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tspan-data
