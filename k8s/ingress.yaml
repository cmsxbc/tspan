apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wyd-server
  namespace: wyd-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: wyd.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wyd-server
                port:
                  number: 80
