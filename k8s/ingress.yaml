apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tspan-server
  namespace: tspan-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  # Only set ingressClassName if your cluster requires it.
  # If omitted, the cluster's default Ingress Controller is used.
  # ingressClassName: nginx
  rules:
    - host: tspan.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tspan-server
                port:
                  number: 80
