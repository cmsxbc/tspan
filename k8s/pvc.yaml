apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tspan-data
  namespace: tspan-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tspan-backup
  namespace: tspan-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
